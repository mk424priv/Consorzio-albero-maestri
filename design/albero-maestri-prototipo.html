<title>Albero Maestri — prototipo completo (brief redesign)</title>

<!--
================================================================================
  ALBERO MAESTRI — PROTOTIPO FUNZIONALE COMPLETO (un solo file)
  Scopo: brief per il redesign. Ogni schermata, ogni tab, ogni bottone e ogni
  funzione sono presenti e funzionanti (stato in memoria, calcoli derivati reali).
  Lo STILE qui è volutamente neutro/scheletrico: è il punto di partenza da
  ridisegnare. La STRUTTURA, la NAVIGAZIONE, i DATI e la LOGICA sono fedeli al
  prodotto reale (Vite+React+TS, local-first, IndexedDB) — qui riscritti in
  vanilla JS perché tutto stia in un file.
--------------------------------------------------------------------------------
  COS'È L'APP
  Diario-gestionale mobile per un maestro-titolare di piccole opere di
  giardinaggio / cura del verde (Isola d'Elba, IT). Lo usa lui stesso "dal
  campo", con una mano, dal telefono. Registra lavori svolti e programmati,
  conta quanto ha guadagnato e quanto deve ancora incassare, gestisce clienti
  e operai, sa chi deve a chi.
--------------------------------------------------------------------------------
  MODELLO DI DOMINIO (entità)
  • Lavoro    — fatto atomico: un'uscita in cantiere in un giorno.
      assi:  fase = fatto | da_fare (svolto/programmato)  ← asse principale
             modo = ore | preventivo
             conteggio = totale | per_giorni
      money: modo "ore"  → lordo = oreTotali × tariffaCliente
             modo "preventivo" → lordo = prezzo concordato
      stato incasso (derivato): non_pagato → parziale → pagato
  • Cliente   — nome (+cognome) · inizialiCodice · tariffaOraria · luogo · contatti
  • Operatore — operaio. Caso speciale "io" (titolare): è sempre fra i
      partecipanti ma le SUE ore NON sono un costo (sono profitto).
  • RegistrazioneOre / Pagamento (denaro IN ENTRATA) / CompensoOperatore
      (denaro IN USCITA) / Spesa.
  DERIVED-NOT-STORED: codice parlante, totali, stati pagamento sono ricalcolati
  a lettura, mai salvati.

  CODICE PARLANTE (timbro d'ottone del cliente): "II-GG-SS-AA"
     II = iniziali · GG = giorni medi d'incasso · SS = spesa media/lavoro÷50 ·
     AA = anni di collaborazione. Tutto derivato dai pagamenti e dai lavori.
--------------------------------------------------------------------------------
  MAPPA SCHERMATE  (router fra parentesi)  ·  "personalità" di ognuna
  Tab-bar inferiore = [ Agenda · ＋ · Soldi · Anagrafiche ]; ＋ = FAB centrale,
  unica azione di creazione. Dashboard NON ha icona nel tab-bar (si apre dal
  blocco riepilogo di Soldi / swipe).

  1  Agenda          (#/)               casa: calendario-diario del mese, calmo.
                                         targhetta d'ottone del giorno, sticky.
  2  Soldi           (#/soldi)          cassaforte: 2 modi da_incassare⇄da_pagare,
                                         "Incasso Subito", prelievo del titolare.
  3  Anagrafiche     (#/anagrafiche)    rubrica: clienti + operai, ricerca.
  4  Dashboard       (#/dashboard)      zoom analitico: modo Clienti (entrate)
                                         vs Operai (uscite), mai mischiati.
  5  Crea record     (#/nuovo)          foglio che cresce: unica nascita dei fatti.
  6  Cantiere        (#/lavoro/:id)     scheda di un lavoro: conti + azioni.
  7  Scheda cliente  (#/cliente/:id)    dossier: codice grande, storia, CTA.
  8  Scheda operaio  (#/operaio/:id)    dossier-mano: statistica minima + azioni.
  9  Nuovo cliente   (#/cliente/nuovo)
  10 Nuovo operaio   (#/operaio/nuovo)
  11 Impostazioni    (#/impostazioni)   backup export/import, dati d'esempio.
--------------------------------------------------------------------------------
  PALETTE SEMANTICA "Quaderno di bottega" (token reali — il redesign può
  sostituirli, ma questi sono gli SLOT semantici da rispettare):
    carta*      superfici (calda)        inchiostro*  testo (sepia)
    ottone*     azione + soldi (metallo) lichene      accenti natura
    positivo (pagato) · attenzione (in attesa) · critico (scaduto)
    carta-svolto = passato caldo · carta-programmato = futuro freddo ·
    carta-incasso = pelle scura del registro (soldi)
================================================================================
-->

<style>

<script>
/* ============================================================================
   0 · UTILITÀ — denaro, date, formato it-IT (porting fedele di src/lib/format.ts)
   ========================================================================== */
const TODAY = "2026-06-24";                 // "oggi" fisso → dati deterministici
const MESE_CORR = TODAY.slice(0,7);          // "2026-06"
const GIORNO_MS = 86400000, UNITA_SPESA = 50, SOGLIA = 0.005;
const arrotonda = n => Math.round((n+Number.EPSILON)*100)/100;
const fmtEuro = new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR"});
const fmtNum  = new Intl.NumberFormat("it-IT",{maximumFractionDigits:2});
const formatEuro = n => fmtEuro.format(n||0);
const formatOre  = n => fmtNum.format(n||0)+" h";
const dataDaISO = iso => {const[y,m,d]=iso.slice(0,10).split("-").map(Number);return new Date(y,m-1,d);};
const msISO = iso => dataDaISO(iso).getTime();
const GIORNI=["domenica","lunedì","martedì","mercoledì","giovedì","venerdì","sabato"];
const GIORNI_B=["dom","lun","mar","mer","gio","ven","sab"];
const MESI=["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];
const MESI_B=["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];
const nomeGiorno=(iso,b)=> (b?GIORNI_B:GIORNI)[dataDaISO(iso).getDay()];
const nomeMese=(iso,b)=> (b?MESI_B:MESI)[dataDaISO(iso).getMonth()];
const giornoDelMese=iso=>dataDaISO(iso).getDate();
const annoDi=iso=>dataDaISO(iso).getFullYear();
const chiaveMese=iso=>iso.slice(0,7);
const formatMese=ch=>`${nomeMese(ch+"-01")} ${annoDi(ch+"-01")}`;
const formatData=iso=>`${dataDaISO(iso).getDate()} ${nomeMese(iso,true)} ${dataDaISO(iso).getFullYear()}`;
const meseAdiacente=(ch,delta)=>{const[a,m]=ch.split("-").map(Number);const d=new Date(a,m-1+delta,1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;};
let _id=0; const nuovoId=()=>"id"+(++_id)+"_"+Math.floor(Math.random()*1e6).toString(36);
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

const ETICHETTE={preventivo:"A preventivo",ore:"A ore",acconto:"Acconto",saldo:"Saldo",manuale:"Manuale",
  fatto:"Fatto",da_fare:"Da fare",totale:"Totale",per_giorni:"A giornate",non_pagato:"Non pagato",
  parziale:"Parziale",pagato:"Pagato",da_pagare:"Da pagare",saldato:"Saldato",titolare:"Titolare",
  collaboratore:"Collaboratore",contanti:"Contanti",bonifico:"Bonifico",altro:"Altro"};
const etichetta=v=> v==null?"—":(ETICHETTE[v]??v);
const TONO_COMPENSO={da_pagare:"attenzione",parziale:"lichene",saldato:"positivo"};

/* ============================================================================
   1 · CODICE PARLANTE — derivato (porting di src/lib/codice-parlante.ts)
   ========================================================================== */
const due=n=>String(Math.min(99,Math.max(0,Math.round(n)))).padStart(2,"0");
function inizialiDa(nome,cognome){
  const a=(nome?.trim()?.[0]??"X").toUpperCase(); const b=(cognome?.trim()?.[0]??"").toUpperCase();
  return (a+b)||"X";
}
function assegnaIniziali(nome,cognome,clienti){
  const base=inizialiDa(nome,cognome);
  const usate=new Set(clienti.filter(c=>!c.deleted).map(c=>c.inizialiCodice));
  if(!usate.has(base))return base; let i=1; while(usate.has(base+i))i++; return base+i;
}
function calcolaParti(d,clienteId){
  const oraMs=msISO(TODAY);
  const pagati=d.pagamenti.filter(p=>p.clienteId===clienteId&&!p.deleted&&p.importoIncassato>0&&p.dataIncasso);
  let gg=0; if(pagati.length){gg=pagati.reduce((a,p)=>a+Math.max(0,(msISO(p.dataIncasso)-msISO(p.dataEmissione))/GIORNO_MS),0)/pagati.length;}
  let ss=0; if(pagati.length){const tot=pagati.reduce((a,p)=>a+p.importoIncassato,0);
    const n=Math.max(1,new Set(pagati.map(p=>p.lavoroId).filter(Boolean)).size); ss=tot/n/UNITA_SPESA;}
  let aa=0; const lav=d.lavori.filter(l=>l.clienteId===clienteId&&!l.deleted);
  if(lav.length){const primo=lav.reduce((m,l)=>l.data<m?l.data:m,lav[0].data);
    aa=Math.floor((oraMs-msISO(primo))/(365.25*GIORNO_MS));}
  return {gg,ss,aa};
}
function codiceCliente(d,clienteId){
  const c=d.clienti.find(x=>x.id===clienteId); if(!c)return "??-00-00-00";
  const {gg,ss,aa}=calcolaParti(d,clienteId);
  return `${c.inizialiCodice}-${due(gg)}-${due(ss)}-${due(aa)}`;
}
function leggiCodice(cod){const p=cod.split("-"); if(p.length!==4)return null;
  return {iniziali:p[0],giorniMedi:+p[1],spesaMedia:+p[2]*UNITA_SPESA,anni:+p[3]};}

/* ============================================================================
   2 · MOTORE DEI CONTI (porting di lavoro-calc.ts + conti.ts)
   ========================================================================== */
const operatoreIo=d=>d.operatori.find(o=>o.ruolo==="titolare")??d.operatori[0];
function partecipantiCalc(d,l){
  const nomeOf=id=>d.operatori.find(o=>o.id===id)?.nome??"—";
  const tariffaOf=id=>d.operatori.find(o=>o.id===id)?.tariffaOraria??0;
  const oreDi=id=>arrotonda(d.ore.filter(o=>o.lavoroId===l.id&&o.operatoreId===id&&!o.deleted).reduce((a,o)=>a+o.ore,0));
  if(l.partecipanti?.length){
    return l.partecipanti.map(p=>({collaboratoreId:p.collaboratoreId,nome:nomeOf(p.collaboratoreId),
      ore:oreDi(p.collaboratoreId),tariffa:p.tariffaSnapshot??tariffaOf(p.collaboratoreId)??0}));
  }
  const ids=new Set(); d.ore.filter(o=>o.lavoroId===l.id&&!o.deleted).forEach(o=>o.operatoreId&&ids.add(o.operatoreId));
  return [...ids].map(id=>({collaboratoreId:id,nome:nomeOf(id),ore:oreDi(id),tariffa:tariffaOf(id)??0}));
}
function calcoloLavoro(d,l){
  const ioId=operatoreIo(d)?.id, base=partecipantiCalc(d,l);
  const oreTotali=arrotonda(base.reduce((a,p)=>a+p.ore,0)), oreCliente=oreTotali;
  const tariffaCli=l.tariffaClienteSnapshot??d.clienti.find(c=>c.id===l.clienteId)?.tariffaOraria??0;
  const lordo=l.modo==="preventivo"?arrotonda(l.prezzo??0):arrotonda(oreCliente*(tariffaCli??0));
  const partecipanti=base.map(p=>{const escludi=p.collaboratoreId===ioId&&!l.contaMieOreComeCosto;
    return {...p,costo:escludi?0:arrotonda(p.ore*p.tariffa)};});
  const costoCollaboratori=arrotonda(partecipanti.reduce((a,p)=>a+p.costo,0));
  const speseTotali=arrotonda(d.spese.filter(s=>s.lavoroId===l.id&&!s.deleted).reduce((a,s)=>a+s.importo,0));
  const incassato=l.fase==="da_fare"?0:arrotonda(d.pagamenti.filter(p=>p.lavoroId===l.id&&!p.deleted).reduce((a,p)=>a+p.importoIncassato,0));
  const netto=arrotonda(lordo-speseTotali-costoCollaboratori);
  const daIncassare=arrotonda(Math.max(0,lordo-incassato));
  const statoIncasso=incassato<=SOGLIA?"non_pagato":incassato>=lordo-SOGLIA?"pagato":"parziale";
  return {oreTotali,oreCliente,lordo,costoCollaboratori,speseTotali,netto,incassato,daIncassare,statoIncasso,partecipanti,fase:l.fase,modo:l.modo};
}
const pagamentoApertoLavoro=(d,id)=>d.pagamenti.find(p=>p.lavoroId===id&&!p.deleted&&p.importoAtteso-p.importoIncassato>SOGLIA);

function statoCompenso(m,v){if(v<=SOGLIA)return"da_pagare";if(v>=m-SOGLIA)return"saldato";return"parziale";}
function dovutoOperatore(d,opId){
  let mat=0;
  for(const l of d.lavori.filter(l=>!l.deleted&&l.fase==="fatto")){
    const p=calcoloLavoro(d,l).partecipanti.find(x=>x.collaboratoreId===opId); if(p)mat+=p.costo;}
  const ver=d.compensi.filter(c=>c.operatoreId===opId&&!c.deleted).reduce((a,c)=>a+c.importo,0);
  const m=arrotonda(mat),v=arrotonda(ver);
  return {maturato:m,versato:v,daPagare:arrotonda(Math.max(0,m-v)),stato:statoCompenso(m,v)};
}
function libroOperatore(d,opId){
  const dv=dovutoOperatore(d,opId);
  const lavori=d.lavori.filter(l=>!l.deleted&&l.partecipanti.some(p=>p.collaboratoreId===opId)).sort((a,b)=>b.data.localeCompare(a.data));
  let ore=0; for(const l of lavori)ore+=d.ore.filter(o=>o.lavoroId===l.id&&o.operatoreId===opId&&!o.deleted).reduce((a,o)=>a+o.ore,0);
  return {ore:arrotonda(ore),dovuto:dv.maturato,pagato:dv.versato,saldo:dv.daPagare,stato:dv.stato,lavori};
}
function totaleDaPagareOperai(d){const io=operatoreIo(d);let t=0;
  d.operatori.filter(o=>!o.deleted&&o.id!==io?.id).forEach(o=>t+=dovutoOperatore(d,o.id).daPagare);return arrotonda(t);}
function riepilogoSoldi(d,mese){
  const svolti=d.lavori.filter(l=>!l.deleted&&l.fase==="fatto");
  let g=0,da=0,n=0;
  for(const l of svolti){const c=calcoloLavoro(d,l);da+=c.daIncassare;
    if(chiaveMese(l.data)===mese){g+=c.lordo;n++;}}
  const inc=d.pagamenti.filter(p=>!p.deleted&&p.dataIncasso&&chiaveMese(p.dataIncasso)===mese).reduce((a,p)=>a+p.importoIncassato,0);
  return {guadagnatoMese:arrotonda(g),incassatoMese:arrotonda(inc),daIncassare:arrotonda(da),daPagareOperai:totaleDaPagareOperai(d),nLavoriSvolti:n};
}
function riepilogoCliente(d,clienteId){
  const lav=d.lavori.filter(l=>!l.deleted&&l.clienteId===clienteId);
  let fatt=0,inc=0,da=0,costo=0,spese=0,marg=0,ore=0;
  for(const l of lav){const c=calcoloLavoro(d,l);ore+=c.oreTotali;
    if(l.fase==="fatto"){fatt+=c.lordo;inc+=c.incassato;da+=c.daIncassare;costo+=c.costoCollaboratori;spese+=c.speseTotali;marg+=c.netto;}}
  return {saldoDaIncassare:arrotonda(da),totaleIncassato:arrotonda(inc),valoreFatturabile:arrotonda(fatt),
    costoManodopera:arrotonda(costo),spese:arrotonda(spese),margine:arrotonda(marg),numeroLavori:lav.length,oreTotali:arrotonda(ore)};
}

  const attivo=giorni[0]||TODAY;

  const sommaGiorno=iso=>{let lordo=0,ore=0;
    for(const l of (perGiorno.get(iso)||[]).filter(x=>x.fase==="fatto")){const c=calcoloLavoro(D,l);lordo+=c.lordo;ore+=c.oreTotali;}
    return {lordo,ore};};

  let head=`<div class="head"><h1>Agenda</h1>${meseNav("agendaMese")}</div>`;
  let targhetta=`<div class="sticky row between" style="margin-bottom:6px">
    <span class="targhetta"><span class="g">${giornoDelMese(attivo)}</span><span class="s">${nomeGiorno(attivo,true)} ${nomeMese(attivo,true)}</span></span>
    ${chiaveMese(TODAY)!==mese?`<button class="btn ottone sm" onclick="ui.agendaMese='${chiaveMese(TODAY)}';render()">oggi</button>`:""}</div>`;

  let corpo;
  if(vuoto){
    corpo=`<div class="vuoto col center gap3" style="padding:64px 0">
      <div style="font-size:2rem;color:var(--lichene)">🌲</div>
      <p style="font-family:var(--serif);font-size:1.1rem;color:var(--ink-medio)">Nessun lavoro in ${formatMese(mese)}</p>
      <p>Tocca ＋ per creare la prima registrazione.</p>
      <button class="btn ottone" onclick="go('#/nuovo')">＋ Crea registrazione</button></div>`;
  }else{
    corpo=`<div class="col gap4" style="padding-top:12px">`+giorni.map(iso=>{
      const ls=perGiorno.get(iso)||[], s=sommaGiorno(iso), isOggi=iso===TODAY;
      return `<section><div class="sticky row between" style="align-items:baseline;top:64px">
        <h2 style="font-size:.85rem;color:${isOggi?"var(--ottone-scuro)":"var(--ink-medio)"}">${nomeGiorno(iso)} ${giornoDelMese(iso)}
          ${isOggi?'<span class="mono" style="font-size:.6rem;text-transform:uppercase;color:var(--ottone)">oggi</span>':""}</h2>
        ${s.lordo>0?`<span class="mono debole" style="font-size:.72rem">${formatEuro(s.lordo)} · ${formatOre(s.ore)}</span>`:""}</div>
        <div class="col gap2" style="margin-top:8px">${
          ls.length===0
          ? `<button class="dashedbox" onclick="go('#/nuovo')">···· nessun lavoro · ＋ crea ····</button>`
          : ls.map(CardLavoro).join("")}</div></section>`;
    }).join("")+`</div>`;
  }
  return head+targhetta+corpo;
}

/* ============================================================================
   8 · SCHERMATA 2 — SOLDI (#/soldi)   cassaforte: entrate/uscite
   ========================================================================== */
function Soldi(){
  const mese=ui.soldiMese, r=riepilogoSoldi(D,mese), io=operatoreIo(D);
  const debitori=D.clienti.filter(c=>!c.deleted).map(c=>({c,saldo:riepilogoCliente(D,c.id).saldoDaIncassare}))
    .filter(x=>x.saldo>0).sort((a,b)=>b.saldo-a.saldo);
  const debitoriOperai=D.operatori.filter(o=>!o.deleted&&o.id!==io?.id).map(o=>({o,libro:libroOperatore(D,o.id)}))
    .filter(x=>x.libro.saldo>0).sort((a,b)=>b.libro.saldo-a.libro.saldo);
  const usciteMese=D.compensi.filter(c=>!c.deleted&&chiaveMese(c.data)===mese).reduce((a,c)=>a+c.importo,0);
  const cassaMese=Math.max(0,r.incassatoMese-usciteMese);

  const dash=(k,v,att)=>`<div class="dash"><span class="k">${k}</span><span class="v${att?" att":""}">${formatEuro(v)}</span></div>`;

  let html=Head("Soldi",{azione:meseNav("soldiMese")});
  html+=`<div class="grid3" style="margin:12px 0;cursor:pointer" onclick="go('#/dashboard')" title="Apri Dashboard">
    ${dash("Guadagnato",r.guadagnatoMese)}${dash("Incassato",r.incassatoMese)}${dash("Da incassare",r.daIncassare,r.daIncassare>0)}</div>`;
  html+=Segmented("soldiModo",ui.soldiModo,[{value:"incassare",label:"Da incassare"},{value:"pagare",label:"Da pagare"}]);

  if(ui.soldiModo==="incassare"){
    html+=`<div class="col gap4" style="margin-top:16px">
      <div class="card piana row between" style="padding:8px 12px">
        <span class="lbl">⬇ Totale da incassare</span><span class="mono" style="color:var(--ottone-scuro)">${formatEuro(r.daIncassare)}</span></div>`;
    if(debitori.length===0)html+=`<p class="vuoto">Tutto incassato. Niente in sospeso.</p>`;
    else html+=debitori.map(({c,saldo})=>{
      const aperti=D.lavori.filter(l=>!l.deleted&&l.clienteId===c.id&&l.fase==="fatto"&&calcoloLavoro(D,l).statoIncasso!=="pagato");
      return `<div class="col gap2"><button class="row between" style="background:none;border:none;cursor:pointer;padding:0"
          onclick="go('#/cliente/${c.id}')">
          <span class="row center gap2">${Codice(D,c.id)}<span style="font-weight:500;font-size:.9rem">${esc(c.nome+" "+(c.cognome||""))}</span></span>
          ${Badge(formatEuro(saldo),"attenzione")}</button>
        ${aperti.map(CardLavoro).join("")}</div>`;}).join("");
    html+=`<button class="btn ottone mt1" onclick="apriSheet('incassoSubito')">＋ Incasso Subito</button></div>`;
  }else{
    html+=`<div class="col gap4" style="margin-top:16px">
      <div class="card piana row between" style="padding:8px 12px">
        <span class="lbl">⬆ Totale da pagare squadra</span><span class="mono" style="color:var(--attenzione)">${formatEuro(r.daPagareOperai)}</span></div>`;
    if(debitoriOperai.length===0)html+=`<p class="vuoto">Nessun compenso in sospeso.</p>`;
    else html+=debitoriOperai.map(({o,libro})=>`<button class="lista-item" onclick="go('#/operaio/${o.id}')">
        <span class="col"><span style="font-weight:500;font-size:.9rem">${esc(o.nome)}</span>
        <span class="mono debole" style="font-size:.66rem">dovuto ${formatEuro(libro.dovuto)} · pagato ${formatEuro(libro.pagato)}</span></span>
        ${Badge(formatEuro(libro.saldo),"attenzione")}</button>`).join("");
    html+=`<div class="card incasso col gap2">
      <div class="row between"><span class="lbl" style="color:rgba(236,227,208,.6)">Io · cassa del mese</span>
        <span class="mono" style="color:var(--ottone-chiaro)">${formatEuro(cassaMese)}</span></div>
      <p style="font-size:.78rem;color:rgba(236,227,208,.6)">Non è un costo, è un prelievo.</p>
      <button class="btn ottone sm" style="align-self:flex-start" ${cassaMese<=0?"disabled":""} onclick="apriSheet('prelievo')">Preleva</button></div></div>`;
  }
  return html;
}

/* ============================================================================
   9 · SCHERMATA 3 — ANAGRAFICHE (#/anagrafiche)   rubrica
   ========================================================================== */
function Anagrafiche(){
  const t=ui.anagQ.trim().toLowerCase();
  const operatori=D.operatori.filter(o=>o.attivo);
  const clienti=D.clienti.filter(c=>!c.deleted&&(!t||`${c.nome} ${c.cognome||""} ${c.inizialiCodice}`.toLowerCase().includes(t)))
    .map(c=>({c,r:riepilogoCliente(D,c.id)})).sort((a,b)=>b.r.saldoDaIncassare-a.r.saldoDaIncassare||a.c.nome.localeCompare(b.c.nome));

  let html=Head("Anagrafiche",{sub:`${D.clienti.length} clienti · ${operatori.length} operai`,

  html+=`<div style="position:relative;margin-top:16px">
    <span style="position:absolute;left:12px;top:12px;color:var(--ink-debole)">⌕</span>

      oninput="ui.anagQ=this.value;clearTimeout(window._q);window._q=setTimeout(render,180)"></div>`;

  html+=`<section class="col gap2" style="margin-top:20px">

      <button class="chip" style="color:var(--ottone-scuro)" onclick="go('#/cliente/nuovo')">＋ Nuovo</button></div>`;
  html+=clienti.map(({c,r})=>`<button class="lista-item" onclick="go('#/cliente/${c.id}')">
      <span class="col" style="min-width:0;gap:2px">
        <span class="row center gap2">${Codice(D,c.id)}<span style="font-size:.9rem">${esc(c.nome+" "+(c.cognome||""))}</span></span>
        <span class="mono debole" style="font-size:.66rem">${c.tariffaOraria?c.tariffaOraria+" €/h · ":""}${r.numeroLavori} ${r.numeroLavori===1?"lavoro":"lavori"}</span></span>
      ${r.saldoDaIncassare>0?Badge(formatEuro(r.saldoDaIncassare),"attenzione"):r.numeroLavori===0?Badge("nuovo","lichene"):""}</button>`).join("");
  html+=`</section>`;

  html+=`<section class="col gap2" style="margin-top:20px">
    <div class="row between"><h2 class="lbl">Operai</h2>
      <button class="chip" style="color:var(--ottone-scuro)" onclick="go('#/operaio/nuovo')">＋ Nuovo</button></div>`;
  html+=operatori.map(o=>{const dov=o.ruolo==="titolare"?null:dovutoOperatore(D,o.id);
    return `<button class="lista-item" onclick="go('#/operaio/${o.id}')">
      <span style="font-size:.9rem">${esc(o.nome)} ${o.ruolo==="titolare"?'<span class="mono debole" style="font-size:.72rem">· io</span>':""}</span>
      ${dov&&dov.daPagare>0?Badge(formatEuro(dov.daPagare),"critico")
        :`<span class="mono debole" style="font-size:.72rem">${o.ruolo==="titolare"?"io":(o.tariffaOraria??0)+" €/h"}</span>`}</button>`;}).join("");
  html+=`</section>`;
  return html;
}

/* ============================================================================
   10 · SCHERMATA 4 — DASHBOARD (#/dashboard)   zoom: entrate vs uscite
   ========================================================================== */
function Dashboard(){
  const io=operatoreIo(D);
  const clienti=D.clienti.filter(c=>!c.deleted).map(c=>({c,r:riepilogoCliente(D,c.id)}))
    .filter(x=>x.r.numeroLavori>0).sort((a,b)=>b.r.saldoDaIncassare-a.r.saldoDaIncassare);
  const operai=D.operatori.filter(o=>!o.deleted).map(o=>({o,libro:libroOperatore(D,o.id)})).sort((a,b)=>b.libro.saldo-a.libro.saldo);
  const kpi=(k,v,att)=>`<div class="kpi"><span class="k">${k}</span><span class="v" style="${att?"color:var(--attenzione)":""}">${v}</span></div>`;

  let html=Head("Dashboard",{azione:btnClose});
  html+=Segmented("dashModo",ui.dashModo,[{value:"clienti",label:"Clienti"},{value:"operai",label:"Operai"}]);

  if(ui.dashModo==="clienti"){
    const K=clienti.reduce((a,{r})=>({fatt:a.fatt+r.valoreFatturabile,inc:a.inc+r.totaleIncassato,da:a.da+r.saldoDaIncassare,rit:a.rit+(r.saldoDaIncassare>0?1:0)}),{fatt:0,inc:0,da:0,rit:0});
    html+=`<div class="grid4" style="margin-top:12px">${kpi("Fatturabile",formatEuro(K.fatt))}${kpi("Incassato",formatEuro(K.inc))}${kpi("Da incassare",formatEuro(K.da),K.da>0)}${kpi("Debitori",String(K.rit))}</div>`;
    html+=`<div class="col gap2" style="margin-top:12px">`+(clienti.length===0?`<p class="vuoto">Nessun cliente con movimenti.</p>`:
      clienti.map(({c,r})=>{const pct=r.valoreFatturabile>0?arrotonda(r.totaleIncassato/r.valoreFatturabile*100):100;
        return `<button class="lista-item col" style="align-items:stretch;gap:6px" onclick="go('#/cliente/${c.id}')">
          <div class="row between"><span class="row center gap2">${Codice(D,c.id)}<span style="font-weight:500;font-size:.9rem">${esc(c.nome+" "+(c.cognome||""))}</span></span>
            ${r.saldoDaIncassare>0?Badge(formatEuro(r.saldoDaIncassare),"attenzione"):Badge("ok","positivo")}</div>
          <span class="mono debole" style="font-size:.66rem">${formatOre(r.oreTotali)} · fatt. ${formatEuro(r.valoreFatturabile)} · inc. ${formatEuro(r.totaleIncassato)}</span>
          <div class="barra"><div style="width:${Math.min(100,pct)}%;background:var(--positivo)"></div></div></button>`;}).join(""))+`</div>`;
  }else{
    const K=operai.reduce((a,{o,libro})=>({ore:a.ore+libro.ore,dovuto:a.dovuto+(o.id===io?.id?0:libro.dovuto),pagato:a.pagato+libro.pagato,saldo:a.saldo+libro.saldo}),{ore:0,dovuto:0,pagato:0,saldo:0});
    html+=`<div class="grid4" style="margin-top:12px">${kpi("Ore squadra",formatOre(K.ore))}${kpi("Dovuto",formatEuro(K.dovuto))}${kpi("Pagato",formatEuro(K.pagato))}${kpi("Da pagare",formatEuro(K.saldo),K.saldo>0)}</div>`;
    html+=`<div class="col gap2" style="margin-top:12px">`+operai.map(({o,libro})=>{const isIo=o.id===io?.id;
      const pct=libro.dovuto>0?arrotonda(libro.pagato/libro.dovuto*100):100;
      return `<button class="lista-item col" style="align-items:stretch;gap:6px" onclick="go('#/operaio/${o.id}')">
        <div class="row between"><span style="font-weight:500;font-size:.9rem">${esc(o.nome)} ${isIo?'<span class="mono debole" style="font-size:.72rem">· io</span>':""}</span>
          ${isIo?Badge("profitto","lichene"):Badge(formatEuro(libro.saldo),TONO_COMPENSO[libro.stato])}</div>
        ${isIo?`<span class="mono debole" style="font-size:.66rem">${formatOre(libro.ore)} · le mie ore = profitto, non costo</span>`
          :`<span class="mono debole" style="font-size:.66rem">${formatOre(libro.ore)} · dovuto ${formatEuro(libro.dovuto)} · pagato ${formatEuro(libro.pagato)}</span>
            <div class="barra"><div style="width:${Math.min(100,pct)}%;background:var(--ottone)"></div></div>`}</button>`;}).join("")+`</div>`;
  }
  html+=`<div class="card piana mono debole" style="margin-top:16px;text-align:center;font-size:.66rem;padding:8px">
    dati separati: clienti = denaro in entrata · operai = denaro in uscita</div>`;
  return html;
}

/* ============================================================================
   11 · SCHERMATA 6 — CANTIERE (#/lavoro/:id)   scheda di un lavoro
   ========================================================================== */
function Cantiere(id){
  const l=find("lavori",id);
  if(!l)return Head("Lavoro",{azione:btnBack})+`<p class="vuoto">Lavoro non trovato.</p>`;
  const c=calcoloLavoro(D,l), cliente=l.clienteId?find("clienti",l.clienteId):null, svolto=l.fase==="fatto";
  const riga=(k,v,forte)=>`<div class="row between"><span style="font-size:.9rem;color:rgba(236,227,208,.7)">${k}</span>
    <span class="mono tabnum" style="${forte?"font-size:1rem;color:var(--ottone-chiaro)":"font-size:.85rem;color:var(--ink-chiaro)"}">${v}</span></div>`;

  let html=Head(l.titolo,{sub:cliente?`${cliente.nome} ${cliente.cognome||""}`.trim():"Senza cliente",azione:btnBack});
  html+=`<div class="row wrap center gap2" style="margin:10px 0">${cliente?Codice(D,cliente.id):""}
    ${Stamp(etichetta(l.fase),svolto?"ottone":"lichene")}${Badge(etichetta(l.modo),"neutro")}
    <span class="mono debole" style="font-size:.72rem">${formatData(l.data)}</span></div>`;
  if(l.periodo)html+=`<p class="mono debole" style="font-size:.72rem">Periodo: ${formatData(l.periodo.dal)} – ${formatData(l.periodo.al)}</p>`;

  html+=`<div class="card incasso col gap2" style="padding:16px">
    ${riga("Lordo",formatEuro(c.lordo),true)}${riga("Ore totali",formatOre(c.oreTotali))}
    ${riga("Costo collaboratori",formatEuro(c.costoCollaboratori))}${riga("Spese",formatEuro(c.speseTotali))}
    <div style="border-top:1px solid rgba(236,227,208,.2);margin:4px 0"></div>
    ${riga("Netto",formatEuro(c.netto),true)}
    ${svolto?riga("Incassato",formatEuro(c.incassato)):""}${svolto?riga("Da incassare",formatEuro(c.daIncassare)):""}</div>`;

  html+=`<section class="col" style="gap:6px;margin-top:16px"><h2 class="lbl">Operai</h2>
    ${c.partecipanti.map(p=>`<div class="row between" style="background:var(--carta-alta);border-radius:var(--r-targhetta);padding:8px 12px;box-shadow:var(--sh-svolto)">
      <span style="font-size:.9rem">${esc(p.nome)}</span>
      <span class="mono debole" style="font-size:.72rem">${formatOre(p.ore)} · costo ${formatEuro(p.costo)}</span></div>`).join("")}</section>`;

  html+=`<div class="row wrap gap2" style="margin-top:16px">
    ${svolto?`<button class="btn fantasma" onclick="riprogramma('${l.id}')">Riprogramma</button>`
      :`<button class="btn inchiostro" onclick="segnaSvolto('${l.id}')">Segna svolto</button>`}
    <button class="btn critico" onclick="eliminaLavoro('${l.id}');history.back()">🗑 Elimina</button></div>`;
  return html;
}

/* ============================================================================
   12 · SCHERMATA 7 — SCHEDA CLIENTE (#/cliente/:id)   dossier
   ========================================================================== */
function ClienteScheda(id){
  const cliente=find("clienti",id);
  if(!cliente)return Head("Cliente",{azione:btnBack})+`<p class="vuoto">Cliente non trovato.</p>`;
  const lavori=D.lavori.filter(l=>!l.deleted&&l.clienteId===id).sort((a,b)=>b.data.localeCompare(a.data));
  const cod=codiceCliente(D,id), dec=leggiCodice(cod), r=riepilogoCliente(D,id);
  const daIncassare=lavori.filter(l=>l.fase==="fatto"&&calcoloLavoro(D,l).statoIncasso!=="pagato");
  const daFare=lavori.filter(l=>l.fase==="da_fare");
  const visibili=ui.clienteFiltro==="incassare"?daIncassare:ui.clienteFiltro==="fare"?daFare:lavori;

  const perMese=new Map();
  for(const l of lavori){const k=chiaveMese(l.data),v=perMese.get(k)||{fatto:0,daFare:0};l.fase==="fatto"?v.fatto++:v.daFare++;perMese.set(k,v);}
  const mesi=[...perMese.entries()].sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);
  const prossimo=daFare.filter(l=>l.data>=TODAY).sort((a,b)=>a.data.localeCompare(b.data))[0];
  const num=(k,v,forte)=>`<div class="col" style="gap:2px"><span class="mono" style="font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:rgba(236,227,208,.6)">${k}</span>
    <span class="mono tabnum" style="${forte?"font-size:1rem;color:var(--ottone-chiaro)":"font-size:.85rem;color:var(--ink-chiaro)"}">${v}</span></div>`;

  let html=Head(`${cliente.nome} ${cliente.cognome||""}`.trim(),{sub:cliente.luogo,azione:btnBack});
  if(cliente.telefono||cliente.email||cliente.luogo)
    html+=`<div class="row wrap medio" style="gap:4px 16px;font-size:.85rem">
      ${cliente.telefono?`<span>☎ ${esc(cliente.telefono)}</span>`:""}${cliente.email?`<span>✉ ${esc(cliente.email)}</span>`:""}
      ${cliente.luogo?`<span>📍 ${esc(cliente.luogo)}</span>`:""}</div>`;

  html+=`<div class="col center" style="gap:6px;padding:6px 0">${Codice(D,id,true)}
    ${dec&&r.numeroLavori>0?`<p class="mono debole" style="font-size:.72rem">paga in ~${dec.giorniMedi} gg · ~${formatEuro(dec.spesaMedia)}/lavoro · ${dec.anni} anni</p>`:""}</div>`;

  html+=`<div class="card incasso col gap3" style="padding:16px">
    <div class="grid4">${num("Da incassare",formatEuro(r.saldoDaIncassare),true)}${num("Incassato",formatEuro(r.totaleIncassato))}${num("Lavori",String(r.numeroLavori))}${num("Ore",formatOre(r.oreTotali))}</div>
    <button style="align-self:flex-start;background:none;border:none;cursor:pointer;font-family:var(--mono);font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;color:rgba(200,159,81,.8)"
      onclick="ui.clienteDettagli=!ui.clienteDettagli;render()">${ui.clienteDettagli?"− dettagli":"+ dettagli economici"}</button>
    ${ui.clienteDettagli?`<div class="grid4" style="border-top:1px solid rgba(236,227,208,.15);padding-top:8px">
      ${num("Margine",formatEuro(r.margine))}${num("Fatturabile",formatEuro(r.valoreFatturabile))}${num("Manodopera",formatEuro(r.costoManodopera))}${num("Spese",formatEuro(r.spese))}</div>`:""}</div>`;

  if(mesi.length)html+=`<div class="card piana col" style="gap:6px"><span class="lbl">Lavori nel tempo</span>
    ${mesi.map(([k,v])=>`<div class="row between" style="font-size:.85rem"><span class="mono medio" style="font-size:.72rem;text-transform:uppercase">${formatMese(k)}</span>
      <span class="mono" style="font-size:.8rem">${"●".repeat(v.fatto)}<span class="debole">${"◌".repeat(v.daFare)}</span></span></div>`).join("")}
    ${prossimo?`<p class="mono" style="margin-top:4px;border-top:1px solid var(--carta-ombra);padding-top:6px;font-size:.72rem;color:var(--lichene)">prossimo: ◌ ${esc(prossimo.titolo)}</p>`:""}</div>`;

  html+=Segmented("clienteFiltro",ui.clienteFiltro,[{value:"tutto",label:"Tutto"},{value:"incassare",label:"Da incassare"},{value:"fare",label:"Da fare"}]);
  html+=`<div class="col gap2" style="margin-top:12px">`+(visibili.length===0
    ?`<p class="vuoto">${ui.clienteFiltro==="incassare"?"Niente da incassare.":ui.clienteFiltro==="fare"?"Nessun lavoro in programma.":"Ancora nessun lavoro."}</p>`
    :visibili.map(CardLavoro).join(""))+`</div>`;
  html+=`<div class="cta-sticky"><button class="btn ottone lg" onclick="go('#/nuovo')">＋ Nuovo lavoro per ${esc(cliente.nome)}</button></div>`;
  return html;
}

/* ============================================================================
   13 · SCHERMATA 8 — SCHEDA OPERAIO (#/operaio/:id)   dossier-mano
   ========================================================================== */
function OperaioScheda(id){
  const op=find("operatori",id);
  if(!op)return Head("Operaio",{azione:btnBack})+`<p class="vuoto">Operaio non trovato.</p>`;

  const perMese=new Map();

  html+=`<div class="grid2">
    <button class="btn ottone" style="flex-direction:column;align-items:flex-start;gap:2px;height:auto;padding:12px" onclick="go('#/nuovo')">
      <span>＋ Aggiungi lavoro</span><span class="mono" style="font-size:.6rem;opacity:.8">svolto · oggi</span></button>
    <button class="btn tenue" style="flex-direction:column;align-items:flex-start;gap:2px;height:auto;padding:12px" onclick="go('#/nuovo')">
      <span>🗓 Pianifica</span><span class="mono" style="font-size:.6rem;opacity:.8">programmato</span></button></div>`;

  if(!io&&libro.saldo>0){
    html+=`<button class="btn inchiostro" onclick="ui.pagaOpen=!ui.pagaOpen;render()">💶 Paga operaio</button>`;
    if(ui.pagaOpen)html+=`<div class="card incasso col gap3" style="padding:16px">
      <div class="row between"><span class="lbl" style="color:rgba(236,227,208,.6)">Da pagare</span>
        <span class="mono" style="color:var(--ottone-chiaro)">${formatEuro(libro.saldo)}</span></div>
      <div class="row center gap2"><input id="pagaImporto" class="input num" style="background:var(--carta-alta)" inputmode="decimal" placeholder="${libro.saldo}">
        <span class="mono" style="color:var(--ink-chiaro)">€</span></div>
      ${Segmented("pagaMetodo",ui.pagaMetodo,[{value:"contanti",label:"Contanti"},{value:"bonifico",label:"Bonifico"},{value:"altro",label:"Altro"}])}
      <button class="btn ottone" onclick="confermaPaga('${op.id}',${libro.saldo})">Paga</button></div>`;
  }

  html+=`<section class="col gap2" style="margin-top:16px"><h2 class="lbl">Storico</h2>`;
  if(libro.lavori.length===0)html+=`<p class="vuoto">Ancora nessun lavoro.</p>`;
  else html+=[...perMese.entries()].sort((a,b)=>b[0].localeCompare(a[0])).map(([mese,lavori])=>`<div class="col gap2">
    <span class="mono debole" style="font-size:.66rem;text-transform:uppercase;letter-spacing:.06em">${formatMese(mese)}</span>
    ${lavori.map(l=>{const cl=l.clienteId?find("clienti",l.clienteId):null,sv=l.fase==="fatto";
      return `<button onclick="go('#/lavoro/${l.id}')" style="display:flex;justify-content:space-between;gap:8px;cursor:pointer;text-align:left;
        padding:8px 12px;border-radius:${sv?"var(--r-quietanza)":"var(--r-carta)"};
        background:${sv?"var(--carta-svolto)":"var(--carta-programmato)"};border:${sv?"none":"1px dashed rgba(139,132,116,.4)"};box-shadow:var(--sh-svolto)">
        <span class="col" style="min-width:0"><span style="font-size:.9rem">${esc((cl?.nome||"—")+" · "+l.titolo)}</span>
          <span class="mono debole" style="font-size:.66rem">${formatData(l.data)}</span></span>
        <span class="row center gap2 mono" style="font-size:.72rem"><span class="medio">${sv?formatOre(oreDi(l.id)):"—"}</span>
          ${sv?`<span style="color:var(--ottone-scuro)">${formatEuro(costoDi(l.id))}</span>`:""}</span></button>`;}).join("")}</div>`).join("");
  html+=`</section>`;
  return html;
}
function confermaPaga(opId,saldo){
  const v=document.getElementById("pagaImporto").value; const n=v?Number(v.replace(",","."))||saldo:saldo;
  ui.pagaOpen=false; pagaOperaio(opId,n,ui.pagaMetodo); toast("Pagato "+formatEuro(n));
}

   Bozza (porting semplificato di store/bozza.ts): unica nascita dei fatti.

let B=bozzaIniziale();
function bozzaIniziale(){return {fase:"fatto",modoCalc:null,clienteId:null,titolo:"",data:TODAY,periodo:null,
  prezzo:null,tariffaCliente:null,tariffaModificata:false,partecipanti:[],giornate:[],spese:[],mostraSpese:false,
  mostraOperai:false,contaMieOreComeCosto:false,giaIncassato:"no",importoParte:0};}
function setModoBozza(m){
  B.modoCalc=m;
  if(m!=="preventivo"&&!B.tariffaModificata){const cl=B.clienteId?find("clienti",B.clienteId):null;B.tariffaCliente=cl?.tariffaOraria??B.tariffaCliente??null;}
  if(B.partecipanti.length===0){const io=operatoreIo(D);if(io)B.partecipanti=[{collaboratoreId:io.id,tariffaSnapshot:0,ore:0}];}
}
function lordoBozza(){
  if(B.modoCalc==="preventivo")return arrotonda(B.prezzo??0);
  const ore=B.partecipanti.reduce((a,p)=>a+(p.ore||0),0);
  return arrotonda(ore*(B.tariffaCliente??0));
}
function resetBozza(){B=bozzaIniziale();const io=operatoreIo(D);if(io)B.partecipanti=[{collaboratoreId:io.id,tariffaSnapshot:0,ore:0}];}
function setBozzaPart(id,ore){const p=B.partecipanti.find(x=>x.collaboratoreId===id);if(p)p.ore=Number(ore)||0;updateStima();}
function updateStima(){const el=document.getElementById("stima");if(el)el.textContent=(B.fase==="fatto"?"":"≈ ")+formatEuro(lordoBozza());}

function CreaLavoro(){
  const io=operatoreIo(D), cliente=B.clienteId?find("clienti",B.clienteId):null, svolto=B.fase==="fatto", lordo=lordoBozza();
  const nome=id=>id===io?.id?"io":find("operatori",id)?.nome||"—";

  let html=Head("Nuovo record",{azione:btnClose});
  html+=Segmented("bozzaFase",B.fase,[{value:"fatto",label:"Svolto"},{value:"da_fare",label:"Programmato"}]);

  html+=`<div class="col gap2" style="margin-top:12px">
    <label class="fld"><span class="lbl">Data</span>
      <input class="input" type="date" value="${B.data}" onchange="B.data=this.value||'${TODAY}'"></label>
    <button class="lista-item" onclick="alert('Picker cliente: scegli o crea (vedi #/cliente/nuovo)')">
      <span class="lbl">Cliente</span><span class="row center gap2" style="font-size:.9rem">
        ${cliente?Codice(D,cliente.id)+" "+esc(cliente.nome):'<span class="debole">scegli o nuovo</span>'} ›</span></button>
    <label class="fld"><span class="lbl">Titolo</span>
      <input class="input" value="${esc(B.titolo)}" placeholder="${B.modoCalc==="preventivo"?"Lavoro a preventivo":"Es. Potatura ulivi"}"
        oninput="B.titolo=this.value"></label></div>`;

  html+=`<div class="col gap2"><span class="lbl">Modalità di calcolo</span>
    ${Segmented("bozzaModo",B.modoCalc||"",[{value:"preventivo",label:"Preventivo"},{value:"ore",label:"Ore"},{value:"giornate",label:"Giornate"},{value:"totale",label:"Totale"}])}</div>`;

  if(B.modoCalc){
    if(B.modoCalc==="preventivo"){
      html+=`<label class="fld"><span class="lbl">Importo concordato</span>
        <div class="row center gap2"><input class="input num" inputmode="decimal" value="${B.prezzo??""}" placeholder="0,00"
          oninput="B.prezzo=Number(this.value.replace(',','.'))||0;updateStima()"><span class="mono debole">€</span></div></label>`;
    }else if(B.modoCalc==="giornate"){
      html+=`<div class="card piana col gap2"><span class="lbl">Giornate (semplificato nel prototipo)</span>
        <p class="debole" style="font-size:.82rem">Nel prodotto reale: righe data×operaio con ore per giorno. Qui usa "Ore" per il totale.</p></div>`;
    }else{
      html+=`<div class="col gap2"><span class="lbl">Ore lavorate</span>
        ${B.partecipanti.map(p=>`<div class="row between center" style="background:var(--carta-alta);border-radius:var(--r-targhetta);padding:8px 12px;box-shadow:var(--sh-svolto)">
          <span style="font-size:.9rem">${esc(nome(p.collaboratoreId))}${p.collaboratoreId!==io?.id?" · "+p.tariffaSnapshot+" €/h":""}</span>
          <span class="row center gap2"><input class="input num" style="width:64px;height:36px" inputmode="decimal" value="${p.ore||""}" placeholder="0"
            oninput="setBozzaPart('${p.collaboratoreId}',this.value)"><span class="mono debole">h</span></span></div>`).join("")}</div>`;
      html+=`<div class="row between center"><span class="lbl">Tariffa cliente</span>
        <span class="row center gap2"><input class="input num" style="width:80px;height:36px" inputmode="decimal" value="${B.tariffaCliente??""}" placeholder="0,00"
          oninput="B.tariffaCliente=Number(this.value.replace(',','.'))||0;B.tariffaModificata=true;updateStima()"><span class="mono debole">€/h</span></span></div>`;
      // collaborazione
      const altri=B.partecipanti.filter(p=>p.collaboratoreId!==io?.id);
      if(altri.length||B.mostraOperai){
        html+=`<div class="card piana col gap2"><span class="lbl">Chi ha lavorato</span>
          ${altri.map(p=>`<div class="row between" style="font-size:.9rem"><span>${esc(find("operatori",p.collaboratoreId)?.nome||"—")} · ${p.tariffaSnapshot} €/h</span>
            <button class="chip" onclick="B.partecipanti=B.partecipanti.filter(x=>x.collaboratoreId!=='${p.collaboratoreId}');render()">✕</button></div>`).join("")}
          <div class="row gap2">${D.operatori.filter(o=>o.attivo&&o.ruolo!=="titolare"&&!B.partecipanti.some(p=>p.collaboratoreId===o.id)).map(o=>
            `<button class="chip" style="color:var(--ottone-scuro)" onclick="B.partecipanti.push({collaboratoreId:'${o.id}',tariffaSnapshot:${o.tariffaOraria??0},ore:0});render()">＋ ${esc(o.nome)}</button>`).join("")||'<span class="debole" style="font-size:.8rem">nessun altro operaio</span>'}</div>
          <label class="row center gap2" style="font-size:.85rem;color:var(--ink-medio)"><input type="checkbox" ${B.contaMieOreComeCosto?"checked":""}
            onchange="B.contaMieOreComeCosto=this.checked;render()"> Conta le mie ore come costo</label></div>`;
      }else{
        html+=`<button class="row center gap2" style="background:none;border:none;cursor:pointer;color:var(--ink-medio);font-size:.9rem;padding:4px"
          onclick="B.mostraOperai=true;render()">＋ Ho lavorato con qualcuno</button>`;
      }
    }
    html+=`<div class="card piana row between" style="padding:8px 12px"><span class="lbl">${svolto?"Lordo":"Stima"}</span>
      <span id="stima" class="mono" style="font-size:1rem;color:var(--ottone-scuro)">${svolto?"":"≈ "}${formatEuro(lordo)}</span></div>`;
  }

  // spese
  if(B.mostraSpese){
    html+=`<div class="card piana col gap2"><span class="lbl">Spese</span>
      ${B.spese.map(s=>`<div class="row gap2 center"><select class="input" style="height:36px;width:auto" onchange="s_cat('${s.id}',this.value)">
        ${["benzina","materiali","attrezzi","altro"].map(c=>`<option ${s.categoria===c?"selected":""}>${c}</option>`).join("")}</select>
        <input class="input" style="height:36px" placeholder="nota" value="${esc(s.descrizione)}" oninput="s_desc('${s.id}',this.value)">
        <input class="input num" style="height:36px;width:64px" placeholder="0" value="${s.importo||""}" oninput="s_imp('${s.id}',this.value)">
        <button class="chip" onclick="B.spese=B.spese.filter(x=>x.id!=='${s.id}');render()">🗑</button></div>`).join("")}
      <button class="chip" onclick="B.spese.push({id:nuovoId(),categoria:'materiali',descrizione:'',importo:0});render()">＋ Aggiungi spesa</button></div>`;
  }else{
    html+=`<button class="row center gap2" style="background:none;border:none;cursor:pointer;color:var(--ink-medio);font-size:.9rem;padding:4px"
      onclick="B.mostraSpese=true;B.spese=[{id:nuovoId(),categoria:'materiali',descrizione:'',importo:0}];render()">＋ Ho speso qualcosa</button>`;
  }

  // già incassato
  if(svolto&&B.modoCalc&&lordo>0){
    const opt=(val,label)=>`<label class="row center gap2" style="font-size:.9rem"><input type="radio" name="inc" ${B.giaIncassato===val?"checked":""}
      onchange="B.giaIncassato='${val}';render()"> ${label}</label>`;
    html+=`<div class="card piana col gap2"><span class="lbl">Già incassato?</span>
      ${opt("no","No, da incassare")}${opt("tutto",`Sì, tutto incassato oggi (${formatEuro(lordo)})`)}${opt("parte","In parte:")}
      ${B.giaIncassato==="parte"?`<input class="input num" style="width:120px;height:36px" placeholder="0,00" value="${B.importoParte||""}"
        oninput="B.importoParte=Math.min(Number(this.value.replace(',','.'))||0,${lordo})">`:""}</div>`;
  }

  html+=`<button class="btn lg ${svolto?"ottone":"inchiostro"} mt1" onclick="salvaBozza()">${svolto?"Salva registrazione":"Pianifica"}</button>`;
  return html;
}
function s_cat(id,v){const s=B.spese.find(x=>x.id===id);if(s)s.categoria=v;}
function s_desc(id,v){const s=B.spese.find(x=>x.id===id);if(s)s.descrizione=v;}
function s_imp(id,v){const s=B.spese.find(x=>x.id===id);if(s)s.importo=Number(v.replace(",","."))||0;}
function salvaBozza(){
  if(!B.modoCalc){toast("Scegli una modalità di calcolo");return;}
  const lordo=lordoBozza();
  if(B.modoCalc==="preventivo"&&(B.prezzo??0)<=0){toast("Inserisci l'importo concordato");return;}
  if(B.modoCalc!=="preventivo"&&B.fase==="fatto"&&B.partecipanti.reduce((a,p)=>a+(p.ore||0),0)<=0){toast("Inserisci almeno qualche ora");return;}
  const lid=nuovoId();
  const lavoro={id:lid,clienteId:B.clienteId||undefined,titolo:B.titolo.trim()||(B.modoCalc==="preventivo"?"Lavoro a preventivo":"Lavoro"),
    data:B.data,fase:B.fase,modo:B.modoCalc==="preventivo"?"preventivo":"ore",conteggio:B.modoCalc==="giornate"?"per_giorni":"totale",
    prezzo:B.modoCalc==="preventivo"?B.prezzo:null,periodo:B.periodo,tariffaClienteSnapshot:B.tariffaCliente,
    partecipanti:B.partecipanti.map(p=>({collaboratoreId:p.collaboratoreId,tariffaSnapshot:p.tariffaSnapshot,oreTotale:p.ore})),
    contaMieOreComeCosto:B.contaMieOreComeCosto,creatoIl:TODAY};
  D.lavori.push(lavoro);
  // registrazioni ore
  if(B.modoCalc!=="preventivo")for(const p of B.partecipanti)if(p.ore>0)
    D.ore.push({id:nuovoId(),lavoroId:lid,clienteId:B.clienteId,operatoreId:p.collaboratoreId,data:B.data,ore:p.ore});
  // spese
  if(B.mostraSpese)for(const s of B.spese)if(s.importo>0)
    D.spese.push({id:nuovoId(),categoria:s.categoria,importo:s.importo,data:B.data,descrizione:s.descrizione,lavoroId:lid,clienteId:B.clienteId});
  // incasso
  if(B.fase==="fatto"&&lordo>0&&B.giaIncassato!=="no"){
    const imp=B.giaIncassato==="tutto"?lordo:B.importoParte;
    if(imp>0)D.pagamenti.push({id:nuovoId(),clienteId:B.clienteId||"",lavoroId:lid,origine:B.modoCalc==="preventivo"?"preventivo":"ore",
      importoAtteso:lordo,importoIncassato:imp,dataEmissione:B.data,dataIncasso:B.data});
  }
  toast(B.fase==="fatto"?"Registrazione salvata":"Lavoro pianificato");
  resetBozza(); go("#/");
}

      <button class="btn tenue" onclick="toast('Importa: seleziona file JSON (mock)')">⬆ Importa</button></div></div>`;
  html+=`<div class="card col gap3" style="padding:16px"><h2>Dati d'esempio</h2>
    <p class="debole" style="font-size:.85rem">Ricarica i dati d'esempio. Sostituisce tutto quello che c'è ora.</p>
    <button class="btn fantasma" style="align-self:flex-start" onclick="if(confirm('Ricaricare i dati d\\'esempio?')){D=JSON.parse(SEED_BACKUP);_id=9999;toast('Dati d\\'esempio ricaricati');go('#/')}">↺ Ricarica esempio</button></div>`;
  html+=`<p class="mono debole" style="text-align:center;font-size:.66rem;margin-top:8px">Albero Maestri · local-first · ${TODAY}</p>`;
  return html;
}
function esportaBackup(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`albero-maestri-${TODAY}.json`;a.click();
  URL.revokeObjectURL(a.href);toast("Backup esportato");
}

/* ============================================================================
   17 · SHEET (Incasso Subito / Prelievo)
   ========================================================================== */
function apriSheet(tipo){
  if(tipo==="incassoSubito"){
    ui.sheet=`<div class="scrim" onclick="if(event.target===this)chiudiSheet()"><div class="sheet col gap3">
      <h2>Incasso Subito</h2><p class="debole" style="font-size:.85rem">A preventivo, tutto subito, senza ore.</p>
      <label class="fld"><span class="lbl">Cliente</span><select class="input" id="isCliente">
        <option value="">Senza cliente</option>${D.clienti.filter(c=>!c.deleted).map(c=>`<option value="${c.id}">${esc(c.nome+" "+(c.cognome||""))}</option>`).join("")}</select></label>
      <label class="fld"><span class="lbl">Descrizione</span><input class="input" id="isTitolo" placeholder="Es. Potatura giardino"></label>
      <label class="fld"><span class="lbl">Importo</span><input class="input num" id="isImporto" inputmode="decimal" placeholder="0,00 €"></label>
      <button class="btn lg ottone" onclick="confermaIncassoSubito()">Incassa</button></div></div>`;
  }else if(tipo==="prelievo"){
    const mese=ui.soldiMese, r=riepilogoSoldi(D,mese);
    const usciteMese=D.compensi.filter(c=>!c.deleted&&chiaveMese(c.data)===mese).reduce((a,c)=>a+c.importo,0);
    const cassa=Math.max(0,r.incassatoMese-usciteMese);
    ui.sheet=`<div class="scrim" onclick="if(event.target===this)chiudiSheet()"><div class="sheet col gap3">
      <h2>Preleva</h2><p class="debole" style="font-size:.85rem">Vai a prendere dei soldi dalla cassa.</p>
      <p class="mono debole" style="font-size:.85rem">Cassa del mese: <span style="color:var(--ottone-scuro)">${formatEuro(cassa)}</span></p>
      <label class="fld"><span class="lbl">Importo</span><input class="input num" id="prImporto" inputmode="decimal" placeholder="${cassa}"></label>
      <button class="btn lg ottone" onclick="confermaPrelievo(${cassa})">Conferma prelievo</button></div></div>`;
  }
  render();
}
function chiudiSheet(){ui.sheet=null;render();}
function confermaIncassoSubito(){
  const importo=Number((document.getElementById("isImporto").value||"").replace(",","."));
  if(!(importo>0)){toast("Inserisci un importo");return;}
  const clienteId=document.getElementById("isCliente").value||undefined;
  const titolo=document.getElementById("isTitolo").value;
  const id=incassaSubito({clienteId,titolo,importo}); ui.sheet=null; toast("Incassato "+formatEuro(importo)); go("#/lavoro/"+id);
}
function confermaPrelievo(cassa){
  const v=document.getElementById("prImporto").value; const n=v?Number(v.replace(",","."))||cassa:cassa;
  ui.sheet=null; prelievoTitolare(n); toast("Prelevato "+formatEuro(n));
}

/* ============================================================================
   18 · AVVIO
   ========================================================================== */
resetBozza();
window.addEventListener("hashchange",render);
render();
</script>
</body>
</html>
