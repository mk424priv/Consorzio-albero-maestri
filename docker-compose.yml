# Postgres locale per lo sviluppo (allineato a .env.example).
# Avvio:  docker compose up -d
services:
  db:
    image: postgres:16-alpine
    container_name: albero-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: albero
      POSTGRES_PASSWORD: albero
      POSTGRES_DB: albero
    ports:
      - "5432:5432"
    volumes:
      - albero-pgdata:/var/lib/postgresql/data

volumes:
  albero-pgdata:
